</head>

<body>
  <h2>Create Thesis and Upload Document</h2>

  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    <fieldset>
      <legend>Thesis Info</legend>
      {{ thesis_form }}
    </fieldset>
    <fieldset>
      <legend>Proposal Upload</legend>
      {{ doc_form2 }}

    <fieldset>

      {{ doc_form1 }}

    <button type="submit">Submit</button>
  </form>
</body>

</html>
