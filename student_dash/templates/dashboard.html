{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Student Dashboard</title>
  <link rel="stylesheet" href="{% static 'dashboard.css' %}">
</head>

<body>
  <nav>
    <a href="{% url 'sdashboard' %}">Dashboard</a> |
    <a href="{% url 'logout' %}">Logout</a>
  </nav>
  <div class="container">
    <h1>Welcome, {{user.username}}</h1>
      {% if thesis %}
    <div class="thesis-info">
      <h2>Thesis: {{thesis.title}} </h2>
      <h3>Research Area: {{thesis.research_area}}</h3>
      <p><strong>Status:</strong> {{thesis.status}}</p>
    </div>
    {% else %}
      <p>Please Upload Thesis</p>
      <a href="{% url 'suploadthesis' %}">Upload Thesis</a>
    {% endif %}
  </div>
</body>

</html>
