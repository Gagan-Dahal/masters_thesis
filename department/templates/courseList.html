{% extends 'base.html' %}

{% block title %}Course List{% endblock %}

{% block content %}
<h2>Course List</h2>

<a href="{% url 'course_create' %}" class="btn">Add Course</a>

<table>
    <thead>
        <tr>
            <th>Name</th>
            <th>Credit</th>
            <th>Department</th>
        </tr>
    </thead>
    <tbody>
        {% for course in courses %}
        <tr>
            <td>{{ course.name }}</td>
            <td>{{ course.credit }}</td>
            <td>{{ course.department_id.name }}</td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="3">No courses found.</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
