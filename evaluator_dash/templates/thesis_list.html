{% extends 'base.html' %}

{% block title %}Thesis List{% endblock %}

{% block extra_css %}
<style>
/* Page title */
h2 {
    text-align: center;
    margin-bottom: 20px;
}

/* Add button */
.btn {
    display: block;
    width: fit-content;
    margin: 0 auto 20px auto;
    padding: 8px 16px;
    background-color: rgb(44, 5, 120);
    color: white;
    text-decoration: none;
    border-radius: 5px;
}

.btn:hover {
    background-color: rgb(80, 40, 170);
}

/* Table styling */
table {
    border-collapse: collapse;
    border: 1px solid black;
    width: 80vw;
    margin: auto;
    background-color: white;
}

/* Table header */
table th {
    background-color: rgb(44, 5, 120);
    color: white;
    padding: 10px;
    text-align: left;
}

/* Table cells */
table td {
    padding: 10px;
}

/* Borders */
table th, table td {
    border: 1px solid black;
}

/* Alternate row color */
tbody tr:nth-child(even) {
    background-color: #f2f2f2;
}

/* Hover effect */
tbody tr:hover {
    background-color: #dfe6ff;
}
</style>
{% endblock %}

{% block content %}
<h2>All Thesis</h2>

<table class="table">
<tr>
    <th>Title</th>
    <th>Student</th>
    <th>Status</th>
    <th>Action</th>
</tr>
{% for thesis in theses %}
<tr>
<td>{{ thesis.title }}</td>
<td>{{ thesis.user.student }}</td>
<td>{{ thesis.status }}</td>
<td>
<a href="{% url 'thesis_detail' thesis.id %}"
class="btn btn-primary">
View
</a>
</td>
</tr>
{% endfor %}
</table>

{% endblock %}
